# Application
quarkus.application.name=api-gateway
quarkus.http.port=8086

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=API Gateway
quarkus.smallrye-openapi.info-version=2.0.0
quarkus.smallrye-openapi.info-description=Unified entry point — validates Keycloak OIDC tokens and routes to downstream services
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ─── Keycloak OIDC (token validation) ─────────────────────────────────────────
# The gateway validates ALL incoming JWT tokens using Keycloak's JWKS endpoint
quarkus.oidc.auth-server-url=http://localhost:8080/realms/ecommerce
quarkus.oidc.client-id=ecommerce-backend
quarkus.oidc.credentials.secret=ecommerce-backend-secret
quarkus.oidc.application-type=service
# Map Keycloak "groups" claim → Quarkus roles
quarkus.oidc.roles.role-claim-path=groups

# ─── Downstream Service URLs ──────────────────────────────────────────────────
quarkus.rest-client.product-service.url=http://localhost:8083
quarkus.rest-client.product-service.scope=jakarta.inject.Singleton

quarkus.rest-client.cart-service.url=http://localhost:8084
quarkus.rest-client.cart-service.scope=jakarta.inject.Singleton

quarkus.rest-client.order-service.url=http://localhost:8085
quarkus.rest-client.order-service.scope=jakarta.inject.Singleton

# Logging — structured JSON
quarkus.log.level=INFO
quarkus.log.category."com.ecommerce".level=DEBUG
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service".value=${quarkus.application.name}

# CORS — allow all origins in dev; tighten in prod
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept,authorization,content-type,x-refresh-token
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS



