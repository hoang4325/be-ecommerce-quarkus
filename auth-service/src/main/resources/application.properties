# Application
quarkus.application.name=auth-service
quarkus.http.port=8082

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Auth Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Authentication and user management via Keycloak
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ─── Keycloak OIDC (for token validation on /api/auth/me) ─────────────────────
quarkus.oidc.auth-server-url=http://localhost:8080/realms/ecommerce
quarkus.oidc.client-id=ecommerce-backend
quarkus.oidc.credentials.secret=ecommerce-backend-secret
quarkus.oidc.application-type=service
# Map Keycloak "groups" claim to roles (our realm role mapper uses claim name "groups")
quarkus.oidc.roles.role-claim-path=groups

# ─── Keycloak Admin Client (for calling Admin REST API) ──────────────────────
keycloak.admin.client-id=ecommerce-backend
keycloak.admin.client-secret=ecommerce-backend-secret

# REST Client: Keycloak Admin API
quarkus.rest-client.keycloak-admin.url=http://localhost:8080
quarkus.rest-client.keycloak-admin.scope=jakarta.inject.Singleton

# REST Client: Keycloak Token endpoint
quarkus.rest-client.keycloak-token.url=http://localhost:8080
quarkus.rest-client.keycloak-token.scope=jakarta.inject.Singleton

# Logging — structured JSON
quarkus.log.level=INFO
quarkus.log.category."com.ecommerce".level=DEBUG
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service".value=${quarkus.application.name}

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept,authorization,content-type,x-refresh-token


