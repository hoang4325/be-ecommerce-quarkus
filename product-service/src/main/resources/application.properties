# Application
quarkus.application.name=product-service
quarkus.http.port=8083

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Product Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Product and Category management
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=admin
quarkus.datasource.password=admin123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/product_db

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ─── Auth ─────────────────────────────────────────────────────────────────────
# Phase 2: Keycloak OIDC (replaces Phase 1 JWT mock)
# When running Phase 2, Keycloak must be up first (docker-compose up -d)
quarkus.oidc.auth-server-url=http://localhost:8080/realms/ecommerce
quarkus.oidc.client-id=ecommerce-backend
quarkus.oidc.credentials.secret=ecommerce-backend-secret
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=groups

# Phase 1 fallback: uncomment these 2 lines and comment the OIDC section above
# to use the dev JWT mock (when Keycloak is NOT running)
# mp.jwt.verify.publickey.location=publicKey.pem
# mp.jwt.verify.issuer=https://ecommerce-dev

# Logging — structured JSON
quarkus.log.level=INFO
quarkus.log.category."com.ecommerce".level=DEBUG
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service".value=${quarkus.application.name}

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*

quarkus.http.cors.headers=accept,authorization,content-type


