# Application
quarkus.application.name=cart-service
quarkus.http.port=8084

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Cart Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Shopping cart management
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=admin
quarkus.datasource.password=admin123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/cart_db

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ─── Auth ─────────────────────────────────────────────────────────────────────
# Phase 2: Keycloak OIDC
quarkus.oidc.auth-server-url=http://localhost:8080/realms/ecommerce
quarkus.oidc.client-id=ecommerce-backend
quarkus.oidc.credentials.secret=ecommerce-backend-secret
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=groups

# Phase 1 fallback:
# mp.jwt.verify.publickey.location=publicKey.pem
# mp.jwt.verify.issuer=https://ecommerce-dev

# REST Client — product-service
quarkus.rest-client.product-service.url=http://localhost:8083
quarkus.rest-client.product-service.scope=jakarta.inject.Singleton

# Logging — structured JSON
quarkus.log.level=INFO
quarkus.log.category."com.ecommerce".level=DEBUG
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service".value=${quarkus.application.name}

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*

quarkus.http.cors.headers=accept,authorization,content-type


