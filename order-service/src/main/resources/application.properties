# Application
quarkus.application.name=order-service
quarkus.http.port=8085

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Order Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Order management
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=admin
quarkus.datasource.password=admin123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/order_db

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ─── Auth: Keycloak OIDC ─────────────────────────────────────────────────────
quarkus.oidc.auth-server-url=http://localhost:8080/realms/ecommerce
quarkus.oidc.client-id=ecommerce-backend
quarkus.oidc.credentials.secret=ecommerce-backend-secret
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=groups

# REST Client — product-service
quarkus.rest-client.product-service.url=http://localhost:8083
quarkus.rest-client.product-service.scope=jakarta.inject.Singleton

# REST Client — cart-service
quarkus.rest-client.cart-service.url=http://localhost:8084
quarkus.rest-client.cart-service.scope=jakarta.inject.Singleton
quarkus.rest-client.cart-service.propagate-token=true

# ─── Kafka (Phase 3) ─────────────────────────────────────────────────────────
kafka.bootstrap.servers=localhost:29092

# Outgoing: order-created
mp.messaging.outgoing.order-created-out.connector=smallrye-kafka
mp.messaging.outgoing.order-created-out.topic=order-created

# Outgoing: order-confirmed
mp.messaging.outgoing.order-confirmed-out.connector=smallrye-kafka
mp.messaging.outgoing.order-confirmed-out.topic=order-confirmed

# Incoming: payment-processed
mp.messaging.incoming.payment-processed-in.connector=smallrye-kafka
mp.messaging.incoming.payment-processed-in.topic=payment-processed
mp.messaging.incoming.payment-processed-in.group.id=order-service
mp.messaging.incoming.payment-processed-in.value.type=com.ecommerce.common.event.PaymentProcessedEvent
mp.messaging.incoming.payment-processed-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.payment-processed-in.dead-letter-queue.topic=payment-processed-dlq

# Incoming: stock-reserved (update order to STOCK_RESERVED)
mp.messaging.incoming.stock-reserved-in.connector=smallrye-kafka
mp.messaging.incoming.stock-reserved-in.topic=stock-reserved
mp.messaging.incoming.stock-reserved-in.group.id=order-service
mp.messaging.incoming.stock-reserved-in.value.type=com.ecommerce.common.event.StockReservedEvent
mp.messaging.incoming.stock-reserved-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.stock-reserved-in.dead-letter-queue.topic=stock-reserved-dlq

# Logging — structured JSON
quarkus.log.level=INFO
quarkus.log.category."com.ecommerce".level=DEBUG
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service".value=${quarkus.application.name}

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept,authorization,content-type


